name: GLaDOS Daily Check-in

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GLADOS_COOKIE: ${{ secrets.GLADOS_COOKIE }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
      GLADOS_BASE_URL: ${{ vars.GLADOS_BASE_URL }}
      GLADOS_CHECKIN_TOKEN: ${{ vars.GLADOS_CHECKIN_TOKEN }}
      GLADOS_ORIGIN: ${{ vars.GLADOS_ORIGIN }}
      GLADOS_REFERER: ${{ vars.GLADOS_REFERER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run daily check-in
        run: python checkin.py
